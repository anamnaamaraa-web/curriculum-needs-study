services:
  - type: web
    name: anamnaamaraa-web
    runtime: docker
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    disk:
      name: curriculum-data
      mountPath: /app/data
      sizeGB: 1
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: DATA_DIR
        value: /app/data
      - key: OPENAI_MODEL
        value: gpt-5.5
      - key: SUPABASE_STATE_TABLE
        value: app_state
      - key: PUBLIC_BASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SECRET_KEY
        sync: false
